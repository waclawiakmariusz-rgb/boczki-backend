<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Magdy — Boczki na bok</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      min-height: 100vh;
    }

    /* ── LOGIN ── */
    #loginScreen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 36px;
      width: 340px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      text-align: center;
    }
    .login-card h1 { font-size: 1.4rem; margin-bottom: 6px; color: #2d3748; }
    .login-card p { font-size: 0.85rem; color: #718096; margin-bottom: 24px; }
    .login-card input[type=password] {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #cbd5e0;
      border-radius: 8px;
      font-size: 1rem;
      margin-bottom: 12px;
      outline: none;
      transition: border-color .2s;
    }
    .login-card input[type=password]:focus { border-color: #667eea; }
    .login-card button {
      width: 100%;
      padding: 10px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background .2s;
    }
    .login-card button:hover { background: #5a67d8; }
    #loginError { color: #e53e3e; font-size: 0.85rem; margin-top: 10px; min-height: 20px; }

    /* ── MAIN ── */
    #mainScreen { display: none; }

    header {
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h2 { font-size: 1.1rem; color: #2d3748; flex: 1; }
    header span.salon { font-size: 0.8rem; color: #718096; }
    #btnLogout {
      background: none; border: 1px solid #e2e8f0; border-radius: 8px;
      padding: 6px 14px; cursor: pointer; font-size: 0.85rem; color: #718096;
    }
    #btnLogout:hover { background: #f7fafc; }

    .container { max-width: 1100px; margin: 0 auto; padding: 20px 16px; }

    /* ── DATE BAR ── */
    .date-bar {
      background: #fff;
      border-radius: 12px;
      padding: 14px 18px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .date-bar label { font-size: 0.85rem; color: #4a5568; }
    .date-bar input[type=date] {
      padding: 6px 10px;
      border: 1px solid #cbd5e0;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
    }
    .date-bar input[type=date]:focus { border-color: #667eea; }
    .preset-btn {
      padding: 6px 12px;
      border: 1px solid #cbd5e0;
      border-radius: 8px;
      background: #f7fafc;
      cursor: pointer;
      font-size: 0.82rem;
      color: #4a5568;
      transition: all .15s;
    }
    .preset-btn:hover, .preset-btn.active { background: #667eea; color: #fff; border-color: #667eea; }
    .btn-szukaj {
      padding: 7px 18px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      margin-left: auto;
    }
    .btn-szukaj:hover { background: #5a67d8; }

    /* ── TABS ── */
    .tabs { display: flex; gap: 4px; margin-bottom: 16px; }
    .tab-btn {
      padding: 9px 22px;
      border: none;
      border-radius: 10px 10px 0 0;
      background: #e2e8f0;
      cursor: pointer;
      font-size: 0.9rem;
      color: #4a5568;
      transition: all .15s;
    }
    .tab-btn.active { background: #fff; color: #2d3748; font-weight: 600; box-shadow: 0 -2px 8px rgba(0,0,0,0.05); }

    /* ── TABLE PANEL ── */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .summary-bar {
      background: #fff;
      border-radius: 0 12px 12px 12px;
      padding: 12px 18px;
      margin-bottom: 4px;
      font-size: 0.85rem;
      color: #4a5568;
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .summary-bar strong { color: #2d3748; }

    .table-wrap {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      overflow: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    thead th {
      background: #f7fafc;
      padding: 10px 12px;
      text-align: left;
      font-weight: 600;
      color: #4a5568;
      border-bottom: 2px solid #e2e8f0;
      white-space: nowrap;
    }
    tbody tr {
      border-bottom: 1px solid #f0f4f8;
      cursor: pointer;
      transition: background .1s;
    }
    tbody tr:hover { background: #ebf4ff; }
    tbody tr.rozliczone { background: #f0fff4; }
    tbody tr.rozliczone:hover { background: #c6f6d5; }
    tbody td {
      padding: 9px 12px;
      vertical-align: middle;
      white-space: nowrap;
    }
    .badge-rozliczone {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 0.78rem;
      font-weight: 600;
      background: #c6f6d5;
      color: #276749;
    }
    .badge-nierozliczone {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 0.78rem;
      background: #fed7d7;
      color: #9b2c2c;
    }
    .empty-msg { padding: 40px; text-align: center; color: #a0aec0; font-size: 0.9rem; }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: #fff;
      border-radius: 16px;
      padding: 28px 28px 22px;
      width: 440px;
      max-width: 96vw;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
    }
    .modal-box h3 { font-size: 1.05rem; color: #2d3748; margin-bottom: 16px; }
    .modal-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #f0f4f8; font-size: 0.88rem; }
    .modal-row:last-of-type { border-bottom: none; }
    .modal-row span:first-child { color: #718096; }
    .modal-row span:last-child { color: #2d3748; font-weight: 500; text-align: right; max-width: 60%; word-break: break-word; white-space: normal; }
    .modal-actions { margin-top: 20px; display: flex; gap: 10px; }
    .modal-actions button {
      flex: 1;
      padding: 9px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all .15s;
    }
    #btnToggleRozlicz { background: #48bb78; color: #fff; }
    #btnToggleRozlicz:hover { background: #38a169; }
    #btnToggleRozlicz.cofnij { background: #e53e3e; }
    #btnToggleRozlicz.cofnij:hover { background: #c53030; }
    #btnCloseModal { background: #e2e8f0; color: #4a5568; }
    #btnCloseModal:hover { background: #cbd5e0; }

    .spinner { text-align: center; padding: 40px; color: #a0aec0; }
    .error-msg { text-align: center; padding: 20px; color: #e53e3e; font-size: 0.9rem; }
  </style>
</head>
<body>

<!-- ══ LOGIN ══════════════════════════════════════════════════ -->
<div id="loginScreen">
  <div class="login-card">
    <h1>Panel Magdy</h1>
    <p>Boczki na bok — rozliczenia</p>
    <input type="password" id="inputHaslo" placeholder="Hasło" autocomplete="current-password" />
    <button id="btnLogin">Zaloguj</button>
    <div id="loginError"></div>
  </div>
</div>

<!-- ══ MAIN ═══════════════════════════════════════════════════ -->
<div id="mainScreen">
  <header>
    <h2>Panel Magdy</h2>
    <span class="salon">Boczki na bok</span>
    <button id="btnLogout">Wyloguj</button>
  </header>

  <div class="container">
    <!-- Date bar -->
    <div class="date-bar">
      <label>Od:</label>
      <input type="date" id="dateOd" />
      <label>Do:</label>
      <input type="date" id="dateDo" />
      <button class="preset-btn" data-preset="today">Dziś</button>
      <button class="preset-btn" data-preset="7">Ostatnie 7 dni</button>
      <button class="preset-btn" data-preset="month">Ten miesiąc</button>
      <button class="btn-szukaj" id="btnSzukaj">Szukaj</button>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="sprzedaz">Sprzedaż</button>
      <button class="tab-btn" data-tab="zadatki">Zadatki</button>
    </div>

    <!-- Sprzedaż panel -->
    <div class="tab-panel active" id="panelSprzedaz">
      <div class="summary-bar" id="summarySprzedaz">Wczytaj dane, aby zobaczyć podsumowanie.</div>
      <div class="table-wrap">
        <div id="tabelaSprzedaz" class="empty-msg">Wybierz zakres dat i kliknij Szukaj.</div>
      </div>
    </div>

    <!-- Zadatki panel -->
    <div class="tab-panel" id="panelZadatki">
      <div class="summary-bar" id="summaryZadatki">Wczytaj dane, aby zobaczyć podsumowanie.</div>
      <div class="table-wrap">
        <div id="tabelaZadatki" class="empty-msg">Wybierz zakres dat i kliknij Szukaj.</div>
      </div>
    </div>
  </div>
</div>

<!-- ══ MODAL ═══════════════════════════════════════════════════ -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <h3 id="modalTitle">Szczegóły</h3>
    <div id="modalBody"></div>
    <div class="modal-actions">
      <button id="btnToggleRozlicz">Oznacz jako rozliczone</button>
      <button id="btnCloseModal">Zamknij</button>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────
let token = localStorage.getItem('magda_token') || '';
let rowsSprzedaz = [];
let rowsZadatki  = [];
let activeTab    = 'sprzedaz';
let modalTabela  = '';
let modalId      = '';
let modalRozliczone = 0;

// ── Helpers ────────────────────────────────────────────────────
const $ = id => document.getElementById(id);

function fmtKwota(v) {
  return Number(v).toLocaleString('pl-PL', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' zł';
}

function dzisiaj() {
  return new Date().toISOString().slice(0, 10);
}

function nDniTemu(n) {
  const d = new Date();
  d.setDate(d.getDate() - n + 1);
  return d.toISOString().slice(0, 10);
}

function poczatekMiesiaca() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-01`;
}

// ── Init daty ─────────────────────────────────────────────────
(function initDaty() {
  $('dateDo').value  = dzisiaj();
  $('dateOd').value  = poczatekMiesiaca();
})();

// ── Auth ───────────────────────────────────────────────────────
function showMain() {
  $('loginScreen').style.display = 'none';
  $('mainScreen').style.display  = 'block';
}

if (token) {
  // Sprawdź czy token nadal ważny przez załadowanie minimalnej trasy
  showMain();
}

$('btnLogin').addEventListener('click', login);
$('inputHaslo').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

async function login() {
  const haslo = $('inputHaslo').value;
  $('loginError').textContent = '';
  try {
    const r = await fetch('/api/magda/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ haslo })
    });
    const d = await r.json();
    if (d.status === 'success') {
      token = d.token;
      localStorage.setItem('magda_token', token);
      showMain();
    } else {
      $('loginError').textContent = d.message || 'Błąd logowania.';
    }
  } catch (e) {
    $('loginError').textContent = 'Błąd połączenia z serwerem.';
  }
}

$('btnLogout').addEventListener('click', () => {
  token = '';
  localStorage.removeItem('magda_token');
  $('mainScreen').style.display = 'none';
  $('loginScreen').style.display = 'flex';
  $('inputHaslo').value = '';
});

// ── Auth header ────────────────────────────────────────────────
function authHeaders() {
  return { 'Content-Type': 'application/json', 'x-magda-token': token };
}

// ── Presets ────────────────────────────────────────────────────
document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const p = btn.dataset.preset;
    if (p === 'today') {
      $('dateOd').value = dzisiaj();
      $('dateDo').value = dzisiaj();
    } else if (p === '7') {
      $('dateOd').value = nDniTemu(7);
      $('dateDo').value = dzisiaj();
    } else if (p === 'month') {
      $('dateOd').value = poczatekMiesiaca();
      $('dateDo').value = dzisiaj();
    }
  });
});

// ── Tabs ───────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    activeTab = btn.dataset.tab;
    $('panel' + activeTab.charAt(0).toUpperCase() + activeTab.slice(1)).classList.add('active');
  });
});

// ── Szukaj ─────────────────────────────────────────────────────
$('btnSzukaj').addEventListener('click', wczytajDane);

async function wczytajDane() {
  const od = $('dateOd').value;
  const _do = $('dateDo').value;
  if (!od || !_do) { alert('Podaj zakres dat.'); return; }

  $('tabelaSprzedaz').innerHTML = '<div class="spinner">Ładowanie...</div>';
  $('tabelaZadatki').innerHTML  = '<div class="spinner">Ładowanie...</div>';

  await Promise.all([
    wczytajSprzedaz(od, _do),
    wczytajZadatki(od, _do)
  ]);
}

async function wczytajSprzedaz(od, _do) {
  try {
    const r = await fetch(`/api/magda/sprzedaz?od=${od}&do=${_do}`, { headers: authHeaders() });
    if (r.status === 401) { handleUnauth(); return; }
    const d = await r.json();
    if (d.status !== 'success') {
      $('tabelaSprzedaz').innerHTML = `<div class="error-msg">${d.message}</div>`;
      return;
    }
    rowsSprzedaz = d.rows || [];
    renderSprzedaz();
  } catch (e) {
    $('tabelaSprzedaz').innerHTML = '<div class="error-msg">Błąd połączenia.</div>';
  }
}

async function wczytajZadatki(od, _do) {
  try {
    const r = await fetch(`/api/magda/zadatki?od=${od}&do=${_do}`, { headers: authHeaders() });
    if (r.status === 401) { handleUnauth(); return; }
    const d = await r.json();
    if (d.status !== 'success') {
      $('tabelaZadatki').innerHTML = `<div class="error-msg">${d.message}</div>`;
      return;
    }
    rowsZadatki = d.rows || [];
    renderZadatki();
  } catch (e) {
    $('tabelaZadatki').innerHTML = '<div class="error-msg">Błąd połączenia.</div>';
  }
}

function handleUnauth() {
  token = '';
  localStorage.removeItem('magda_token');
  $('mainScreen').style.display = 'none';
  $('loginScreen').style.display = 'flex';
  alert('Sesja wygasła. Zaloguj się ponownie.');
}

// ── Render Sprzedaż ────────────────────────────────────────────
function renderSprzedaz() {
  const rows = rowsSprzedaz;
  const total = rows.reduce((s, r) => s + Number(r.kwota || 0), 0);
  const rozliczone = rows.filter(r => r.czy_rozliczone).reduce((s, r) => s + Number(r.kwota || 0), 0);
  const nierozliczone = total - rozliczone;
  const licRoz = rows.filter(r => r.czy_rozliczone).length;
  $('summarySprzedaz').innerHTML =
    `Łącznie: <strong>${rows.length} transakcji</strong> &nbsp;|&nbsp; ` +
    `Suma: <strong>${fmtKwota(total)}</strong> &nbsp;|&nbsp; ` +
    `Rozliczone: <strong>${licRoz} (${fmtKwota(rozliczone)})</strong> &nbsp;|&nbsp; ` +
    `Nierozliczone: <strong>${rows.length - licRoz} (${fmtKwota(nierozliczone)})</strong>`;

  if (!rows.length) {
    $('tabelaSprzedaz').innerHTML = '<div class="empty-msg">Brak transakcji w podanym okresie.</div>';
    return;
  }

  let html = `<table><thead><tr>
    <th>Data</th><th>Klient</th><th>Zabieg</th><th>Sprzedawca</th>
    <th>Kwota</th><th>Płatność</th><th>Status</th><th>Rozliczenie</th>
  </tr></thead><tbody>`;

  rows.forEach(r => {
    const cls = r.czy_rozliczone ? 'rozliczone' : '';
    const badge = r.czy_rozliczone
      ? '<span class="badge-rozliczone">Rozliczone</span>'
      : '<span class="badge-nierozliczone">Nierozliczone</span>';
    const data = r.data_sprzedazy ? String(r.data_sprzedazy).slice(0, 10) : '';
    html += `<tr class="${cls}" data-id="${r.id}" data-tabela="sprzedaz">
      <td>${data}</td>
      <td>${escH(r.klient || '')}</td>
      <td>${escH(r.zabieg || '')}</td>
      <td>${escH(r.sprzedawca || '')}</td>
      <td style="font-weight:600">${fmtKwota(r.kwota)}</td>
      <td>${escH(r.platnosc || '')}</td>
      <td>${escH(r.status || '')}</td>
      <td>${badge}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  $('tabelaSprzedaz').innerHTML = html;
  bindRowClicks('tabelaSprzedaz');
}

// ── Render Zadatki ─────────────────────────────────────────────
function renderZadatki() {
  const rows = rowsZadatki;
  const total = rows.reduce((s, r) => s + Number(r.kwota || 0), 0);
  const rozliczone = rows.filter(r => r.czy_rozliczone).reduce((s, r) => s + Number(r.kwota || 0), 0);
  const licRoz = rows.filter(r => r.czy_rozliczone).length;
  $('summaryZadatki').innerHTML =
    `Łącznie: <strong>${rows.length} zadatków</strong> &nbsp;|&nbsp; ` +
    `Suma: <strong>${fmtKwota(total)}</strong> &nbsp;|&nbsp; ` +
    `Rozliczone: <strong>${licRoz} (${fmtKwota(rozliczone)})</strong> &nbsp;|&nbsp; ` +
    `Nierozliczone: <strong>${rows.length - licRoz} (${fmtKwota(total - rozliczone)})</strong>`;

  if (!rows.length) {
    $('tabelaZadatki').innerHTML = '<div class="empty-msg">Brak zadatków w podanym okresie.</div>';
    return;
  }

  let html = `<table><thead><tr>
    <th>Data</th><th>Klient</th><th>Typ</th><th>Kwota</th>
    <th>Metoda</th><th>Cel</th><th>Pracownicy</th><th>Status</th><th>Rozliczenie</th>
  </tr></thead><tbody>`;

  rows.forEach(r => {
    const cls = r.czy_rozliczone ? 'rozliczone' : '';
    const badge = r.czy_rozliczone
      ? '<span class="badge-rozliczone">Rozliczone</span>'
      : '<span class="badge-nierozliczone">Nierozliczone</span>';
    const data = r.data_wplaty ? String(r.data_wplaty).slice(0, 10) : '';
    html += `<tr class="${cls}" data-id="${r.id}" data-tabela="zadatki">
      <td>${data}</td>
      <td>${escH(r.klient || '')}</td>
      <td>${escH(r.typ || '')}</td>
      <td style="font-weight:600">${fmtKwota(r.kwota)}</td>
      <td>${escH(r.metoda || '')}</td>
      <td>${escH(r.cel || '')}</td>
      <td>${escH(r.pracownicy || '')}</td>
      <td>${escH(r.status || '')}</td>
      <td>${badge}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  $('tabelaZadatki').innerHTML = html;
  bindRowClicks('tabelaZadatki');
}

function bindRowClicks(containerId) {
  document.querySelectorAll(`#${containerId} tbody tr`).forEach(tr => {
    tr.addEventListener('click', () => {
      const tabela = tr.dataset.tabela;
      const id     = tr.dataset.id;
      const rows   = tabela === 'sprzedaz' ? rowsSprzedaz : rowsZadatki;
      const row    = rows.find(r => String(r.id) === String(id));
      if (row) openModal(tabela, row);
    });
  });
}

// ── Modal ──────────────────────────────────────────────────────
function openModal(tabela, row) {
  modalTabela     = tabela;
  modalId         = row.id;
  modalRozliczone = row.czy_rozliczone ? 1 : 0;

  $('modalTitle').textContent = tabela === 'sprzedaz' ? 'Szczegóły sprzedaży' : 'Szczegóły zadatku';

  let bodyHtml = '';
  if (tabela === 'sprzedaz') {
    const data = row.data_sprzedazy ? String(row.data_sprzedazy).slice(0, 10) : '';
    bodyHtml = modalRow('Data', data)
             + modalRow('Klient', row.klient)
             + modalRow('Zabieg', row.zabieg)
             + modalRow('Sprzedawca', row.sprzedawca)
             + modalRow('Kwota', fmtKwota(row.kwota))
             + modalRow('Płatność', row.platnosc)
             + modalRow('Status', row.status)
             + modalRow('Komentarz', row.komentarz || '—')
             + modalRow('Szczegóły', row.szczegoly || '—');
  } else {
    const data = row.data_wplaty ? String(row.data_wplaty).slice(0, 10) : '';
    bodyHtml = modalRow('Data wpłaty', data)
             + modalRow('Klient', row.klient)
             + modalRow('Typ', row.typ)
             + modalRow('Kwota', fmtKwota(row.kwota))
             + modalRow('Metoda', row.metoda)
             + modalRow('Cel', row.cel)
             + modalRow('Pracownicy', row.pracownicy || '—')
             + modalRow('Status', row.status);
  }
  $('modalBody').innerHTML = bodyHtml;

  const btn = $('btnToggleRozlicz');
  if (modalRozliczone) {
    btn.textContent = 'Cofnij rozliczenie';
    btn.className   = 'cofnij';
  } else {
    btn.textContent = 'Oznacz jako rozliczone';
    btn.className   = '';
  }

  $('modalOverlay').classList.add('open');
}

function modalRow(label, value) {
  return `<div class="modal-row"><span>${escH(label)}</span><span>${escH(String(value || ''))}</span></div>`;
}

$('btnCloseModal').addEventListener('click', () => {
  $('modalOverlay').classList.remove('open');
});
$('modalOverlay').addEventListener('click', e => {
  if (e.target === $('modalOverlay')) $('modalOverlay').classList.remove('open');
});

$('btnToggleRozlicz').addEventListener('click', toggleRozlicz);

async function toggleRozlicz() {
  const nowaWartosc = modalRozliczone ? 0 : 1;
  try {
    const r = await fetch('/api/magda/rozlicz', {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify({ tabela: modalTabela, id: modalId, czy_rozliczone: nowaWartosc })
    });
    if (r.status === 401) { handleUnauth(); return; }
    const d = await r.json();
    if (d.status !== 'success') { alert(d.message || 'Błąd.'); return; }

    // Zaktualizuj lokalnie
    const rows = modalTabela === 'sprzedaz' ? rowsSprzedaz : rowsZadatki;
    const row  = rows.find(r => String(r.id) === String(modalId));
    if (row) row.czy_rozliczone = d.czy_rozliczone;

    if (modalTabela === 'sprzedaz') renderSprzedaz();
    else renderZadatki();

    $('modalOverlay').classList.remove('open');
  } catch (e) {
    alert('Błąd połączenia z serwerem.');
  }
}

// ── XSS helper ────────────────────────────────────────────────
function escH(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
</script>
