<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nie znaleziono strony — Boczki na bok</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Poppins', sans-serif;
            background: #fdf8f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 56px 48px;
            text-align: center;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(255,117,140,0.1), 0 4px 20px rgba(0,0,0,0.05);
        }
        .emoji-wrap {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #fff0f3, #ffe4ea);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin: 0 auto 28px;
        }
        h1 {
            font-size: 72px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff758c, #ff7eb3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 8px;
        }
        h2 {
            font-size: 20px;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 12px;
        }
        p {
            font-size: 14px;
            color: #6b7280;
            line-height: 1.7;
            margin-bottom: 36px;
        }
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #ff758c, #ff7eb3);
            color: white;
            text-decoration: none;
            padding: 14px 32px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 14px;
            box-shadow: 0 8px 20px rgba(255,117,140,0.35);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(255,117,140,0.45);
        }
        .footer {
            margin-top: 32px;
            font-size: 12px;
            color: #a0aec0;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="emoji-wrap">🎀</div>
        <h1>404</h1>
        <h2>Ups! Tej strony nie ma</h2>
        <p>Wygląda na to, że adres który wpisałeś/aś nie istnieje.<br>Może literówka? Albo strona została przeniesiona.</p>
        <a href="/" class="btn">← Wróć do systemu</a>
        <div class="footer">Boczki na bok &middot; System zarządzania salonem</div>
    </div>
</body>
</html>
